name: gardens
static_sites:
  - name: gardens-frontend
    github:
      repo: Control-B/Gardens
      branch: main
      deploy_on_push: true
    source_dir: /artifacts/finutility
    build_command: pnpm build:do:static
    output_dir: dist/public
    index_document: index.html
    error_document: 404.html
    catchall_document: index.html
    envs:
      - key: NODE_ENV
        value: production
        scope: BUILD_TIME